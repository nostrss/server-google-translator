steps:
  # Docker 이미지 빌드
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'asia-northeast3-docker.pkg.dev/$PROJECT_ID/stt-translator/app:$COMMIT_SHA'
      - '-t'
      - 'asia-northeast3-docker.pkg.dev/$PROJECT_ID/stt-translator/app:latest'
      - '.'

  # Artifact Registry에 푸시
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - '--all-tags'
      - 'asia-northeast3-docker.pkg.dev/$PROJECT_ID/stt-translator/app'

  # Cloud Run 배포
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - stt-translator
      - '--image=asia-northeast3-docker.pkg.dev/$PROJECT_ID/stt-translator/app:$COMMIT_SHA'
      - '--region=asia-northeast3'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--timeout=3600'
      - '--concurrency=80'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--set-env-vars=NODE_ENV=production,SENTENCE_SPLITTER_URL=https://sentence-splitter-588497594238.asia-northeast3.run.app,ALLOWED_ORIGINS=chrome-extension://ellmimobokloigiacmkkojdnppfldbgc'
      - '--set-secrets=SONIOX_API_KEY=SONIOX_API_KEY:latest,OPENROUTER_API_KEY=OPENROUTER_API_KEY:latest'

images:
  - 'asia-northeast3-docker.pkg.dev/$PROJECT_ID/stt-translator/app:$COMMIT_SHA'
  - 'asia-northeast3-docker.pkg.dev/$PROJECT_ID/stt-translator/app:latest'

options:
  logging: CLOUD_LOGGING_ONLY
